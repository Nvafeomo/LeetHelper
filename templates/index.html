<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetTracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>LeetTracker</h1>
      <p class="tagline">Browse the catalog, log attempts, reflect on progress</p>
    </header>

    <nav class="tabs">
      <button type="button" class="tab active" data-tab="catalog">Catalog</button>
      <button type="button" class="tab" data-tab="search">Search attempts</button>
      <button type="button" class="tab" data-tab="stats">Stats</button>
    </nav>

    <main class="content">
      <section id="catalog" class="panel active">
        <div class="toolbar">
          <input type="search" id="catalogSearch" class="search-input" placeholder="Filter by title…" autocomplete="off">
          <select id="sortBy" class="select-input" title="Sort by">
            <option value="id">Sort: problem #</option>
            <option value="title">Sort: title</option>
            <option value="difficulty">Sort: difficulty</option>
          </select>
          <select id="sortOrder" class="select-input" title="Order">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
          </select>
          <select id="tagFilter" class="select-input" title="Topic tag">
            <option value="">All topics</option>
          </select>
        </div>
        <p class="hint" id="tagHint"></p>
        <div class="catalog-wrap">
          <table class="catalog-table" id="catalogTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Difficulty</th>
                <th>Topics</th>
              </tr>
            </thead>
            <tbody id="catalogBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="catalogPagination"></div>
      </section>

      <section id="search" class="panel">
        <div class="panel-header">
          <input type="text" id="approachSearch" class="search-input" placeholder="Search notes by approach keyword (e.g. DP, greedy)…">
          <button type="button" id="searchAttemptsBtn" class="btn btn-secondary">Search</button>
        </div>
        <div id="searchResults" class="problems-list"></div>
      </section>

      <section id="stats" class="panel">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>Fastest hard (first timed attempt)</h3>
            <ul id="fastestHard"></ul>
          </div>
          <div class="stat-card">
            <h3>Most time — by topic</h3>
            <span class="stat-hint">Uses first topic tag; add <code>data/problem_topics.json</code> to label rows.</span>
            <ul id="slowestCategories"></ul>
          </div>
        </div>
        <div class="stat-card full-width">
          <h3>Time stats for problem #</h3>
          <div class="inline-form">
            <input type="number" id="statsProblemId" placeholder="LeetCode problem #" min="1" step="1">
            <button type="button" id="loadStatsBtn" class="btn btn-secondary">Load stats</button>
          </div>
          <div id="timeStats" class="time-stats"></div>
        </div>
      </section>
      <section id="Blind 75" class="panel"> 
        <div class="toolbar">
          <input type="search" id="catalogSearch" class="search-input" placeholder="Filter by title…" autocomplete="off">
          <select id="sortBy" class="select-input" title="Sort by">
            <option value="id">Sort: problem #</option>
            <option value="title">Sort: title</option>
            <option value="difficulty">Sort: difficulty</option>
          </select>
          <select id="sortOrder" class="select-input" title="Order">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
          </select>
          <select id="tagFilter" class="select-input" title="Topic tag">
            <option value="">All topics</option>
          </select>
        </div>
      </section>
    </main>
  </div>

  <div id="problemModal" class="modal">
    <div class="modal-content modal-wide">
      <button type="button" class="modal-close" aria-label="Close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
